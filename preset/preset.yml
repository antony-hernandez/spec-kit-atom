schema_version: "1.0"

preset:
  id: "atom"
  name: "Atom Developer Skills"
  version: "1.0.0"
  description: "Atom codebase steering: constitution rules (Angular/TypeScript/CodeGraph) and Atom sections in spec/plan templates"
  author: "Atom Team"
  repository: "https://github.com/antony-hernandez/spec-kit-atom"
  license: "MIT"

requires:
  speckit_version: ">=0.6.0"

provides:
  templates:
    - type: "template"
      name: "constitution-template"
      file: "templates/constitution-template.md"
      description: "Atom constitution — reglas no negociables del codebase"
      replaces: "constitution-template"

    - type: "template"
      name: "spec-template"
      file: "templates/spec-template.md"
      description: "Secciones de Atom agregadas al spec (stack, Figma, contratos TS, blast radius)"
      strategy: "append"

    - type: "template"
      name: "plan-template"
      file: "templates/plan-template.md"
      description: "Constraints de Atom agregados al plan (concreción, verificación, commits, CodeGraph)"
      strategy: "append"

tags:
  - "atom"
  - "angular"
  - "typescript"
  - "codegraph"
  - "atlassian"
